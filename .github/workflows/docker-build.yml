name: Docker Build

permissions:
  contents: read

on:
  push:
  pull_request:

jobs:
  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      API_DOCKERFILE: docker/api.Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker compose config --quiet
      - run: docker compose build api web
