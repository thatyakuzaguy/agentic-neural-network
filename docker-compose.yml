services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-locally}
      POSTGRES_DB: ${POSTGRES_DB:-agentic_engineering_network}
    volumes:
      - ./data/postgres/db:/var/lib/postgresql/data
      - ./packages/database/agentic_engineering_network/database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentic} -d ${POSTGRES_DB:-agentic_engineering_network}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    profiles:
      - ollama
    volumes:
      - ./data/ollama:/root/.ollama
    ports:
      - "11434:11434"

  api:
    build:
      context: .
      dockerfile: ${API_DOCKERFILE:-docker/api.gpu.Dockerfile}
    environment:
      AEN_ROOT: /workspace
      AEN_HOST_ROOT: ${AEN_HOST_ROOT:-D:\AgenticEngineeringNetwork}
      AEN_HOST_WORKSPACE_DRIVE: ${AEN_HOST_WORKSPACE_DRIVE:-D:}
      AEN_WORKSPACE_DRIVE_MOUNT: /host-d
      APP_ENV: local
      AI_PROVIDER: ${AI_PROVIDER:-llama_cpp}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1}
      LOCAL_MODEL_PATH: ${LOCAL_MODEL_PATH:-/workspace/models/qwen2.5-coder-7b-q4_k_m.gguf}
      LOCAL_MODEL_CONTEXT: ${LOCAL_MODEL_CONTEXT:-8192}
      LOCAL_MODEL_MAX_TOKENS: ${LOCAL_MODEL_MAX_TOKENS:-768}
      LOCAL_MODEL_TEMPERATURE: ${LOCAL_MODEL_TEMPERATURE:-0.2}
      LOCAL_MODEL_GPU_LAYERS: ${LOCAL_MODEL_GPU_LAYERS:-35}
      LOCAL_MODEL_MAIN_GPU: ${LOCAL_MODEL_MAIN_GPU:-0}
      AEN_MAX_REPAIR_ATTEMPTS: ${AEN_MAX_REPAIR_ATTEMPTS:-10}
      AEN_REPAIR_BACKOFF_BASE_SECONDS: ${AEN_REPAIR_BACKOFF_BASE_SECONDS:-1}
      AEN_REPAIR_BACKOFF_MAX_SECONDS: ${AEN_REPAIR_BACKOFF_MAX_SECONDS:-30}
      AEN_REMOVE_SANDBOX_IMAGES_AFTER_RUN: ${AEN_REMOVE_SANDBOX_IMAGES_AFTER_RUN:-true}
      AEN_RATE_LIMIT_REQUESTS_PER_MINUTE: ${AEN_RATE_LIMIT_REQUESTS_PER_MINUTE:-180}
      AEN_API_TOKEN: ${AEN_API_TOKEN:-}
      AEN_ADMIN_TOKEN: ${AEN_ADMIN_TOKEN:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID:-}
      STRIPE_MOCK_MODE: ${STRIPE_MOCK_MODE:-true}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      POSTHOG_API_KEY: ${POSTHOG_API_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-agentic}:${POSTGRES_PASSWORD:-change-me-locally}@postgres:5432/${POSTGRES_DB:-agentic_engineering_network}
    volumes:
      - ./:/workspace
      - "D:/:/host-d"
      - /var/run/docker.sock:/var/run/docker.sock
    gpus: all
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - api
