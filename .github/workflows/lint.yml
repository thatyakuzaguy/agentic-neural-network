name: Lint

permissions:
  contents: read

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: python -m pip install --upgrade pip ruff
      - run: ruff check agentic_network apps packages tests/python scripts
      - run: npm ci
      - run: npm --workspace apps/web run lint
