name: Security Scan

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 3 * * 1"

jobs:
  secrets-and-dependencies:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip pip-audit
      - run: pip-audit --progress-spinner off --requirement apps/api/requirements.txt
      - name: Audit optional local-model dependencies
        run: >-
          pip-audit --progress-spinner off
          --requirement apps/api/requirements-models.txt
      - name: Audit isolated llama.cpp binding
        run: >-
          pip-audit --progress-spinner off --disable-pip --no-deps
          --requirement apps/api/requirements-llama-cpp.txt
      - name: Verify llama.cpp DiskCache removal policy
        run: python scripts/security/verify_llama_cpp_dependency_policy.py
      - run: npm audit --omit=dev --audit-level=moderate
