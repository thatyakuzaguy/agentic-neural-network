name: Test

permissions:
  contents: read

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Map canonical ANN source path
        shell: pwsh
        run: |
          if (-not (Test-Path 'D:\AgenticEngineeringNetwork')) {
            New-Item -ItemType Junction -Path 'D:\AgenticEngineeringNetwork' -Target $env:GITHUB_WORKSPACE | Out-Null
          }
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest tests/python -q
      - run: npm ci
      - run: npm --workspace apps/web run test
      - run: npm --workspace apps/web run build
