name: Test

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
      - name: Map canonical ANN source path
        shell: pwsh
        run: |
          if (-not (Test-Path 'D:\AgenticEngineeringNetwork')) {
            New-Item -ItemType Junction -Path 'D:\AgenticEngineeringNetwork' -Target $env:GITHUB_WORKSPACE | Out-Null
          }
      - name: Verify public repository structure
        shell: pwsh
        run: ./scripts/release/verify-public-repository.ps1 -AllowContentDrift
      - name: Verify local documentation links
        run: python scripts/release/verify_markdown_links.py
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - name: Run Python tests on ANN-safe drive
        shell: pwsh
        env:
          TEMP: D:\ANN-CI-Tmp
          TMP: D:\ANN-CI-Tmp
        run: |
          New-Item -ItemType Directory -Path 'D:\ANN-CI-Tmp' -Force | Out-Null
          python -m pytest tests/python -q --basetemp 'D:\ANN-CI-Tmp\pytest'
      - run: npm ci
      - name: Validate patched production dependency tree
        run: node scripts/security/verify-postcss-resolution.mjs
      - run: npm audit --audit-level=moderate
      - run: npm --workspace apps/web run test
      - run: npm --workspace apps/web run build
